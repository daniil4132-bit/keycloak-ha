---
- name: Run preflight checks
  hosts: all
  become: false
  roles:
    - role: preflight
      tags:
        - preflight
  tags:
    - preflight

- name: Prepare base system and project files
  hosts: all
  become: true
  roles:
    - common
    - project
  tags:
    - base

- name: Deploy etcd cluster
  hosts: etcd
  become: true
  roles:
    - etcd
  tags:
    - etcd

- name: Deploy PostgreSQL HA layer
  hosts: postgres_nodes
  become: true
  roles:
    - docker_images
    - patroni
    - pg_haproxy
  tags:
    - postgres

- name: Deploy Keycloak application layer
  hosts: keycloak_nodes
  become: true
  roles:
    - keycloak
    - keycloak_haproxy
  tags:
    - keycloak

- name: Deploy UCARP VIP failover
  hosts: ucarp_nodes
  become: true
  roles:
    - ucarp
  tags:
    - ucarp
