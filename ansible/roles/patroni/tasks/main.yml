---
- name: Create PostgreSQL data directory for Patroni
  file:
    path: "{{ project_dir }}/volumes/postgres"
    state: directory
    mode: "0755"

- name: Set PostgreSQL data directory owner using Patroni image user
  shell: |
    docker run --rm \
      --user root \
      -v "{{ project_dir }}/volumes/postgres:/var/lib/postgresql/data" \
      --entrypoint sh \
      keycloak-ha-patroni:1.0 \
      -c "chown -R postgres:postgres /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data"
  args:
    chdir: "{{ project_dir }}"

- name: Start Patroni/PostgreSQL container
  shell: docker compose --env-file .env -f docker-compose-patroni.yml up -d
  args:
    chdir: "{{ project_dir }}"

- name: Wait for Patroni REST API port
  wait_for:
    host: "{{ host_ip }}"
    port: 8008
    timeout: 180

- name: Wait until Patroni member reports running state
  uri:
    url: "http://{{ host_ip }}:8008/"
    status_code:
      - 200
      - 503
  register: patroni_status
  retries: 30
  delay: 5
  until:
    - patroni_status.json is defined
    - patroni_status.json.state is defined
    - patroni_status.json.state in ["running", "streaming"]
  changed_when: false

- name: Check whether local Patroni member is primary
  uri:
    url: "http://{{ host_ip }}:8008/primary"
    status_code:
      - 200
      - 503
  register: patroni_primary_check
  failed_when: false
  changed_when: false

- name: Ensure Keycloak database user, password and database exist on primary
  shell: |
    set -a
    . ./.env
    set +a

    USER_EXISTS="$(docker exec -i patroni psql -U postgres -d postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='${KEYCLOAK_DB_USERNAME}'")"

    if [ "${USER_EXISTS}" != "1" ]; then
      docker exec -i patroni psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
        -c "CREATE ROLE ${KEYCLOAK_DB_USERNAME} WITH LOGIN PASSWORD '${KEYCLOAK_DB_PASSWORD}';"
    fi

    docker exec -i patroni psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
      -c "ALTER ROLE ${KEYCLOAK_DB_USERNAME} WITH LOGIN PASSWORD '${KEYCLOAK_DB_PASSWORD}';"

    DB_EXISTS="$(docker exec -i patroni psql -U postgres -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${KEYCLOAK_DB}'")"

    if [ "${DB_EXISTS}" != "1" ]; then
      docker exec -i patroni createdb -U postgres -O "${KEYCLOAK_DB_USERNAME}" "${KEYCLOAK_DB}"
    fi

    docker exec -i patroni psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
      -c "GRANT ALL PRIVILEGES ON DATABASE ${KEYCLOAK_DB} TO ${KEYCLOAK_DB_USERNAME};"
  args:
    chdir: "{{ project_dir }}"
  when: patroni_primary_check.status == 200
