---
- name: Install base packages required before adding repositories
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3
      - python3-pip
      - python3-apt
      - git
      - rsync
      - iproute2
      - iputils-ping
    state: present
    update_cache: true

- name: Ensure APT keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker official APT repository
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Update apt cache after adding Docker repository
  apt:
    update_cache: true

- name: Install Docker Engine from official Docker repository
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Add SSH user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
